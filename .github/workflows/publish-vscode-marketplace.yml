name: Publish VSCode and Open VSX Marketplaces

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (for example: 3.1.1)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.repository.default_branch }}

      - name: Update Changelog
        if: ${{ github.event_name == 'release' && github.event.release.draft == false && github.event.release.prerelease == false  }}
        uses: rhysd/changelog-from-release/action@v3
        with:
          file: CHANGELOG.md
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            RAW_VERSION="$RELEASE_TAG"
          else
            RAW_VERSION="$INPUT_VERSION"
          fi

          VERSION="${RAW_VERSION#v}"

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver version: $RAW_VERSION"
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Set extension version
        run: npm pkg set version="${{ steps.version.outputs.value }}"

      - name: Package extension
        id: package_extension
        run: |
          set -euo pipefail

          VSIX_PATH="shortcut-menu-bar-plus-${{ steps.version.outputs.value }}.vsix"
          npx --no-install vsce package --out "$VSIX_PATH"
          echo "vsix_path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish to VSCode Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --no-install vsce publish --packagePath "${{ steps.package_extension.outputs.vsix_path }}"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx --no-install ovsx publish "${{ steps.package_extension.outputs.vsix_path }}"
